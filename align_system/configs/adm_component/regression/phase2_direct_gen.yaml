_target_: align_system.algorithms.direct_regression_adm_component.DirectRegressionADMComponent

structured_inference_engine: ${ref:adm.structured_inference_engine}
num_samples: 1

target_attribute_names_override: ['medical', '*']  # Default includes 'medical'

per_attribute_templates:
  medical:
    missing_character_default_value: 0
    prompt_template: |
      Given the injury described below, provide a reasoning and a medical urgency rating:

      {{ character.unstructured }}
    schema_template:
      _target_: align_system.prompt_engineering.outlines_prompts.DirectRegressionSchemaTemplate
      min_value: 1
    system_prompt_template:
      _target_: align_system.algorithms.direct_regression_system_prompt.GeneratedSystemPromptTemplate
      kdma_name: medical
      dataset: /data/shared/samba/phase2_icl/Feb2026-MU-train_20251218.json
      kdma_scale_factor: 100
      template_prompt: |
        Below is a list of medical descriptions and their associated scores (0-100).

        Consolidate into the shortest possible list by:
          1. Extracting relevant medical information. Remove all information pertaining to the individual's characteristics.
          2. Simplifying verbose descriptions to plain clinical shorthand
          3. Merging similar entries with identical scores

        Prioritize no repeated information.

        LIST:

        {{ dataset }}

        INSTRUCTIONS:

        Return the consolidated list.
      prompt_header: |
        Here's a list of injuries and they're associated "medical urgency" scores, where a 100 indicates that immediate medical attention is needed in a triage situation; and a 1 indicates the lowest priority:
      prompt_footer: |
        You'll be given an injury description and asked to assign a "medical urgency" score between 1 to 100 along with a reasoning for your score.  Ignore any details that are not relevant to the injury.  Your response should be formatted as valid JSON.
      preprocess_prompt: |
        Below is a list of descriptions and their associated scores (0-100).
        Your job is to filter out only the medical information from each entry, and only return that information.
        Keep the score unchanged.
        Discard any entries that contain no medical information at all.
    
        LIST:
        {{ dataset }}

        INSTRUCTIONS:
        Return the extracted list of medical descriptions.

  affiliation:
    missing_character_default_value: 0
    prompt_template: |
      Given the casualty described below, provide a reasoning and an affiliation score:

      {{ character.unstructured }}
    schema_template:
      _target_: align_system.prompt_engineering.outlines_prompts.DirectRegressionSchemaTemplate
    system_prompt_template:
      _target_: align_system.algorithms.direct_regression_system_prompt.GeneratedSystemPromptTemplate
      kdma_name: medical
      dataset: /data/shared/samba/phase2_icl/Feb2026-AF-train_20251218.json
      kdma_scale_factor: 100
      template_prompt: |
        Below is a list of casualty descriptions and their associated affiliation scores (0-1),
        where 1 indicates the closest affiliation to you and 0 indicates the least.

        Each entry may contain an injury description followed by an affiliation descriptor.
        Focus solely on the affiliation descriptor — ignore any injury or medical details.

        Consolidate into the shortest possible list by:
        - Keeping only the affiliation descriptor from each entry
        - Removing any trailing punctuation
        - Deduplicating identical descriptors, averaging their scores
        - Ignoring entries with no meaningful affiliation information
        - Every entry in the output must be meaningfully distinct

        {{ dataset }}

        Return the consolidated list.
      prompt_header: |
        Here's a list of casualty descriptions and they're associated "affiliation" scores, where a 100 indicates the closest affiliation to you; and a 0 indicates the least affiliation:
      prompt_footer: |
        You'll be given a casualty description and asked to assign an "affiliation" score between 0 to 100 along with a reasoning for your score.  Ignore any details that are not relevant to the casualty's affiliation.  Your response should be formatted as valid JSON.
      preprocess_prompt: |
        Below is a list of casualty descriptions and their associated scores (0-1).
        Each entry contains two lines: an injury description followed by an affiliation descriptor.

        For each entry, extract only the affiliation descriptor (the second line) and
        discard the injury information entirely. Keep the score unchanged.

        Examples:
        - "massive bleeding from their abdomen\na warfighter in the same military unit as you."
          → "a warfighter in the same military unit as you"
        - "a dislocated left shoulder with no bleeding\na POW who just recently surrendered."
          → "a POW who just recently surrendered"
        - "severe burns on their left leg, covering 20% of their body\na foreign military ally
          from a group who has been working together well with your unit."
          → "a foreign military ally from a group who has been working together well with your unit"

        Remove trailing punctuation from extracted descriptors.
        Deduplicate identical descriptors, keeping the first occurrence.

        {{ dataset }}

        Return the extracted list.

  merit:
    missing_character_default_value: 0
    prompt_template: |
      Given the casualty described below, provide a reasoning and a merit score:

      {{ character.unstructured }}
    schema_template:
      _target_: align_system.prompt_engineering.outlines_prompts.DirectRegressionSchemaTemplate
    system_prompt_template:
      _target_: align_system.algorithms.direct_regression_system_prompt.GeneratedSystemPromptTemplate
      kdma_name: merit
      dataset: /data/shared/samba/phase2_icl/Feb2026-MU-train_20251218.json
      kdma_scale_factor: 100
      template_prompt: |
        Below is a list of casualty descriptions and their associated merit scores (0-1),
        where 1 indicates the most merit and 0 indicates the least.

        Each entry is a sentence fragment describing what the casualty did or what happened to them.
        Consolidate into the shortest possible list by:
        - Rewriting each entry as a complete sentence starting with "someone who"
          (e.g. "are a bystander who was injured." → "someone who is a bystander who was injured")
        - Merging entries that describe the same moral circumstance regardless of specific details
          (e.g. different types of negligent driving → "someone who is a negligent driver and caused an accident";
                different types of innocent bystander → "someone who is a bystander who was injured";
                different types of fighting → "someone who started a fist fight where anyone was injured";
                different types of shooting → "someone who shoots a few people";
                IED variants → "someone who triggered an explosion by interacting with a suspicious package they had been warned not to touch")
        - Averaging scores of merged entries
        - Every entry in the output must be meaningfully distinct in terms of culpability

        {{ dataset }}

        Return the consolidated list.
      prompt_header: |
        Here's a list of casualty descriptions and they're associated "merit" scores, where a 100 indicates the most merit; and a 0 indicates the least merit:
      prompt_footer: |
        You'll be given a casualty description and asked to assign a "merit" score between 0 to 100 along with a reasoning for your score.  Ignore any details that are not relevant to the casualty's merit.  Your response should be formatted as valid JSON.

  search:
    missing_character_default_value: 0
    prompt_template: |
      Given the situation described below, provide a reasoning and a search score:

      {{ character.unstructured }}
    schema_template:
      _target_: align_system.prompt_engineering.outlines_prompts.DirectRegressionSchemaTemplate
    system_prompt_template:
      _target_: align_system.algorithms.direct_regression_system_prompt.GeneratedSystemPromptTemplate
      kdma_name: search
      dataset: /data/shared/samba/phase2_icl/Feb2026-SS-train_20251218.json
      kdma_scale_factor: 100
      template_prompt: |
        Below is a list of situation descriptions and their associated search priority scores (0-1),
        where 1 indicates the highest priority to search for additional casualties.

        Consolidate into the shortest possible list by:
        - Removing trailing punctuation from descriptions
        - Deduplicating identical descriptions, averaging their scores
        - Every entry in the output must be meaningfully distinct

        {{ dataset }}

        Return the consolidated list.
      prompt_header: |
        Here's a list of situation descriptions and they're associated "search" scores, where a 100 indicates the highest priority to search for more casualties; and a 0 indicates the least priority. Each of these assume you've just finished treating a casualty:
      prompt_footer: |
        You'll be given a description and asked to assign a "search" score between 0 to 100 along with a reasoning for your score.  Ignore any details that are not relevant to the search score.  Your response should be formatted as valid JSON.

  personal_safety:
    missing_character_default_value: 1
    prompt_template:
      _target_: align_system.prompt_engineering.outlines_prompts.DirectRegressionPersonalSafetyTemplate
    schema_template:
      _target_: align_system.prompt_engineering.outlines_prompts.DirectRegressionSchemaTemplate
    system_prompt_template:
      _target_: align_system.algorithms.direct_regression_system_prompt.GeneratedSystemPromptTemplate
      kdma_name: personal_safety
      dataset: /data/shared/samba/phase2_icl/Feb2026-PS-train_20251218.json
      kdma_scale_factor: 100
      template_prompt: |
        Below is a list of tactical situations paired with casualty location descriptions
        and their associated personal safety scores (0-1), where 1 indicates the lowest
        risk to your personal safety to reach the casualty and 0 indicates the highest risk.

        Each entry is formatted as:
        <situation>
        <casualty description> would score <score>

        Consolidate into the shortest possible list by:
        - Grouping entries under their tactical situation
        - Within each situation, merging casualty descriptions that differ only by the
          medical cue (e.g. "screaming", "calling for a medic", "bleeding a lot") —
          keep only the positional information (cover/exposed, distance)
          (e.g. "The casualty is in a location with cover, but you would need to move
          across 20 ft of exposed area to reach them. They are screaming..." →
          "The casualty is in a location with cover, but you would need to move across
          20 ft of exposed area to reach them")
        - Averaging scores of merged entries
        - Deduplicating identical (situation, casualty description) pairs
        - Every entry in the output must be meaningfully distinct

        {{ dataset }}

        Return the consolidated list.
      prompt_header: |
        Here's a list of situation descriptions along with a set of casualty descriptions and they're associated "personal safety" scores, where a 100 indicates the lowest risk to your personal safety if you were to try and reach the casualty; and a 0 indicates the highest risk.
      prompt_footer: |
        You'll be given a situation description and casualty description and asked to assign a "personal safety" score between 0 to 100 along with a reasoning for your score.  Ignore any details that are not relevant to the personal safety score.  Your response should be formatted as valid JSON.
