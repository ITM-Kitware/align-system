_target_: align_system.algorithms.icl_adm_component.ICLADMComponent

target_attribute_names_override: ['medical', '*']

icl_generator_partial:
  _target_: align_system.utils.incontext_utils.Phase2ComparativeRegressionIncontextExampleGenerator
  # Partially initialize so we can finish initialization with multiple
  # alignment targets
  _partial_: true

  incontext_settings:
    number: 5
    method: prompt_bert_similarity
    leave_one_out_strategy: null
    normalization: null
    sort_actions: true
    most_similar_first: false
    choice_order: fixed
    datasets:
      medical: align_system/resources/icl/phase2/July2025-MU-train_20250804.json
      affiliation: align_system/resources/icl/phase2/July2025-AF-train_20250804.json
      merit: align_system/resources/icl/phase2/July2025-MF-train_20250804.json
      personal_safety: align_system/resources/icl/phase2/July2025-PS-train_20250804.json
      search: align_system/resources/icl/phase2/July2025-SS-train_20250804.json

  state_hydration_domain: p2triage
